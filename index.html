<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Word Practice Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mario-red: #ff0000;
            --mario-blue: #30a0e0;
            --mario-yellow: #fcd000;
            --neon-yellow: #faff00;
        }

        body {
            margin: 0;
            font-family: 'Balsamiq Sans', cursive;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .active { display: flex; }

        #menu-screen { background-image: url('startpage.jpg'); background-size: cover; background-position: center; }
        #game-screen { background-image: url('gamebackground.jpg'); background-size: cover; background-position: center; }

        .music-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            padding: 12px 20px;
            background: white;
            border: 3px solid black;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Balsamiq Sans', cursive;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px 50px;
            border-radius: 30px;
            border: 8px solid var(--mario-red);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 220px; padding: 12px; margin: 10px auto;
            border-radius: 50px; border: none; cursor: pointer;
            font-family: 'Balsamiq Sans', cursive; font-weight: bold; font-size: 18px;
            box-shadow: 0 6px #b38f00;
        }
        .btn-start { background-color: var(--mario-yellow); color: black; }
        .btn-edit { background-color: var(--mario-blue); color: white; box-shadow: 0 6px #1a6a96; }

        .game-header { 
            position: absolute; top: 15px; font-size: 28px; color: white; 
            font-weight: bold; text-shadow: 3px 3px 0px #000; 
        }

        .game-layout { display: flex; align-items: center; gap: 20px; width: 98%; max-width: 1400px; }
        
        .player-card {
            padding: 20px; border-radius: 20px; text-align: center; color: white;
            min-width: 180px; background: rgba(0,0,0,0.6);
            border: 4px solid var(--neon-yellow);
            box-shadow: 0 0 15px var(--neon-yellow);
            transition: 0.3s;
        }

        .player-card.active-turn { 
            transform: scale(1.05);
            box-shadow: 0 0 35px var(--neon-yellow), 0 0 60px var(--neon-yellow);
        }

        .character-sticker { width: 180px; height: auto; animation: jump 0.8s infinite ease-in-out; }

        .points-box {
            background: #000; border: 2px solid var(--neon-yellow); border-radius: 10px;
            padding: 5px 12px; margin-top: 15px; font-size: 22px; color: var(--neon-yellow);
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            flex-grow: 1; 
            justify-items: center;
        }

        .word-box {
            background: white;
            width: 150px;  
            height: 100px; 
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-bottom: 5px solid #bbb;
            color: #333;
            overflow: hidden;
            text-align: center;
            padding: 8px;
            box-sizing: border-box;
        }

        .word-box.revealed { cursor: default; border-bottom: none; color: white; }
        .word-box.bomb { background-color: #333; }
        .word-box.mega-bomb { background-color: #8b0000; box-shadow: inset 0 0 20px #ff0000; }
        
        .coin-img { max-width: 60px; max-height: 60px; object-fit: contain; }

        #editor-screen textarea { width: 320px; height: 180px; font-family: 'Balsamiq Sans', cursive; border-radius: 10px; padding: 10px; }
        .limit-note { font-size: 12px; color: var(--mario-red); font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="supermariothemesong.mp3" type="audio/mpeg">
    </audio>

    <button class="music-toggle" onclick="toggleMusic()">
        <span id="music-icon">🔇</span> Music: <span id="music-status">OFF</span>
    </button>

    <div id="menu-screen" class="screen active">
        <div class="menu-card">
            <h1>MARIO WORD<br>PRACTICE GAME</h1>
            <button class="btn btn-start" onclick="startGame()">▶ START GAME</button>
            <button class="btn btn-edit" onclick="showScreen('editor-screen')">✎ EDIT WORDS</button>
        </div>
    </div>

    <div id="editor-screen" class="screen">
        <div class="menu-card">
            <h2>Edit Word List</h2>
            <p>Enter words (one per line)</p>
            <textarea id="word-input" oninput="checkLimit(this)">flower
yoshi
mushroom
star
sun
peach
robot
coin
toad
bowser
luigi
queen</textarea>
            <p class="limit-note" id="limit-msg">Maximum: 20 words</p>
            <button class="btn btn-start" onclick="showScreen('menu-screen')">SAVE & BACK</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-header" id="turn-display">Mario's Turn</div>
        <div class="game-layout">
            <div id="mario-card" class="player-card active-turn">
                <div style="font-weight: bold; margin-bottom:5px;">TEAM MARIO</div>
                <img src="Mario.jpg" class="character-sticker">
                <div class="points-box" id="mario-score">Points: 0</div>
            </div>
            <div class="grid" id="word-grid"></div>
            <div id="luigi-card" class="player-card">
                <div style="font-weight: bold; margin-bottom:5px;">TEAM LUIGI</div>
                <img src="Luigi.jpg" class="character-sticker">
                <div class="points-box" id="luigi-score">Points: 0</div>
            </div>
        </div>
        <button class="btn btn-edit" style="margin-top: 20px; width: 140px; font-size: 14px;" onclick="location.reload()">QUIT</button>
    </div>

    <script>
        let words = [];
        let scores = { mario: 0, luigi: 0 };
        let currentTurn = 'mario';
        let isMusicPlaying = false;
        const music = document.getElementById('bg-music');

        function checkLimit(el) {
            const lines = el.value.split('\n').filter(w => w.trim() !== "");
            if (lines.length > 20) {
                el.value = lines.slice(0, 20).join('\n');
                document.getElementById('limit-msg').innerText = "Word limit reached (20)!";
            } else {
                document.getElementById('limit-msg').innerText = "Maximum: 20 words";
            }
        }

        function toggleMusic() {
            if (isMusicPlaying) {
                music.pause();
                document.getElementById('music-status').innerText = "OFF";
                document.getElementById('music-icon').innerText = "🔇";
            } else {
                music.play().catch(e => console.log("Blocked"));
                document.getElementById('music-status').innerText = "ON";
                document.getElementById('music-icon').innerText = "🎵";
            }
            isMusicPlaying = !isMusicPlaying;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startGame() {
            if(!isMusicPlaying) toggleMusic();
            const text = document.getElementById('word-input').value;
            words = text.split('\n').filter(w => w.trim() !== "").slice(0, 20);
            
            scores = { mario: 0, luigi: 0 };
            currentTurn = 'mario';
            updateUI();
            
            const grid = document.getElementById('word-grid');
            grid.innerHTML = '';
            
            grid.style.gridTemplateColumns = words.length > 12 ? "repeat(5, 1fr)" : "repeat(4, 1fr)";

            const total = words.length;
            
            // DYNAMIC BOMB CALCULATION
            let regBombs = Math.max(1, Math.floor(total * 0.25));
            let megaBombs;

            if (total > 12) {
                megaBombs = 2; // Add 2 mega bombs if more than 12 words
            } else {
                megaBombs = 1; // Default to 1 mega bomb
            }
            
            let contents = new Array(total).fill('coin');
            
            // Add Regular Bombs
            for(let i=0; i<regBombs; i++) contents[i] = 'bomb';
            
            // Add Mega Bombs (ensure we don't overwrite if word list is too small, though limit is 20)
            for(let j=0; j<megaBombs; j++) {
                contents[regBombs + j] = 'mega-bomb';
            }

            contents.sort(() => Math.random() - 0.5);

            words.forEach((word, index) => {
                const box = document.createElement('div');
                box.className = 'word-box';
                box.innerText = word;
                if(words.length > 15) box.style.fontSize = "16px";
                box.onclick = () => revealBox(box, contents[index]);
                grid.appendChild(box);
            });

            showScreen('game-screen');
        }

        function revealBox(element, type) {
            if (element.classList.contains('revealed')) return;
            element.classList.add('revealed');
            element.classList.add(type);
            
            if (type === 'coin') {
                element.innerHTML = `<img src="coin.gif" class="coin-img">`;
                scores[currentTurn]++;
            } else if (type === 'bomb') {
                element.innerHTML = `<span style="font-size:30px;">💣</span><span style="font-size:12px;">-1</span>`;
                scores[currentTurn] = Math.max(0, scores[currentTurn] - 1);
            } else if (type === 'mega-bomb') {
                element.innerHTML = `<span style="font-size:30px;">🧨</span><span style="font-size:12px; color:yellow;">MEGA -2</span>`;
                scores[currentTurn] = Math.max(0, scores[currentTurn] - 2);
            }

            updateUI();
            currentTurn = (currentTurn === 'mario') ? 'luigi' : 'mario';
            updateTurnDisplay();
        }

        function updateUI() {
            document.getElementById('mario-score').innerText = `Points: ${scores.mario}`;
            document.getElementById('luigi-score').innerText = `Points: ${scores.luigi}`;
        }

        function updateTurnDisplay() {
            document.getElementById('turn-display').innerText = currentTurn.charAt(0).toUpperCase() + currentTurn.slice(1) + "'s Turn";
            document.getElementById('mario-card').classList.toggle('active-turn', currentTurn === 'mario');
            document.getElementById('luigi-card').classList.toggle('active-turn', currentTurn === 'luigi');
        }
    </script>
</body>
</html>
